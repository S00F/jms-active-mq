# Spring Boot ActiveMQ Configuration

# Connect to external ActiveMQ Docker container
# Update the broker-url to match your Docker container host/port
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin

# JMS Configuration
spring.jms.pub-sub-domain=false

# Connection Pool Configuration
spring.activemq.pool.enabled=true
spring.activemq.pool.max-connections=10

# Logging Configuration
logging.level.org.apache.activemq=INFO
logging.level.org.springframework.jms=DEBUG
logging.level.org.example=DEBUG
